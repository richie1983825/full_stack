version: "3.9"

services:
  backend:
    image: ${BACKEND_IMAGE:-cmp-backend:latest}
    container_name: cmp-backend
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres123}@localhost:5432/cmp_service
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3101
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_HOURS: "24"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      SNAPSHOT_DIR: /app/data/snapshots
    volumes:
      - snapshots:/app/data/snapshots

  frontend:
    image: ${FRONTEND_IMAGE:-cmp-frontend:latest}
    container_name: cmp-frontend
    restart: unless-stopped
    network_mode: host
    depends_on:
      - backend

volumes:
  snapshots:
